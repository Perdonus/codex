name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses
      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew
      - name: Build debug APK
        env:
          GITHUB_DEVICE_CLIENT_ID: ${{ secrets.GITHUB_DEVICE_CLIENT_ID }}
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: codex-android-debug
          path: app/build/outputs/apk/debug/*.apk

  upload-apk-to-server:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.SERVER_HOST != '' && secrets.SERVER_USER != '' && secrets.SERVER_SSH_KEY != '' && secrets.SERVER_UPLOAD_PATH != '' }}
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: codex-android-debug
          path: dist

      - name: Prepare upload files
        run: |
          set -euo pipefail
          mkdir -p upload
          APK_PATH="$(find dist -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in downloaded artifact" >&2
            exit 1
          fi
          cp "$APK_PATH" "upload/codex-android-debug-${GITHUB_RUN_NUMBER}.apk"
          cp "$APK_PATH" "upload/codex-android-debug-latest.apk"

      - name: Ensure remote upload directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: mkdir -p "${{ secrets.SERVER_UPLOAD_PATH }}"

      - name: Upload APK to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "upload/*.apk"
          target: ${{ secrets.SERVER_UPLOAD_PATH }}
          overwrite: true
