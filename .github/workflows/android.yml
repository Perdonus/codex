name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APK_ARTIFACT_NAME: codex-android-debug

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          GITHUB_DEVICE_CLIENT_ID: ${{ secrets.GITHUB_DEVICE_CLIENT_ID }}
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --console=plain 2>&1 | tee gradle-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          retention-days: 7

      - name: Surface Gradle failure details
        if: failure()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          log_path = Path("gradle-build.log")
          lines = log_path.read_text(errors="replace").splitlines() if log_path.exists() else []
          marker_patterns = [
              re.compile(r"^FAILURE: "),
              re.compile(r"^\* What went wrong:"),
              re.compile(r"^\* Exception is:"),
              re.compile(r"^Caused by:"),
              re.compile(r"^e: "),
              re.compile(r"^.* error: "),
              re.compile(r"(Execution failed|Could not resolve|Could not find|Unresolved reference|Compilation error)"),
          ]

          collected = []
          for index, line in enumerate(lines):
              if any(pattern.search(line) for pattern in marker_patterns):
                  window = lines[index:index + 8]
                  collected.extend(item.strip() for item in window if item.strip())

          deduped = []
          seen = set()
          for item in collected:
              if item not in seen:
                  deduped.append(item)
                  seen.add(item)

          snippet = deduped[-30:] if deduped else lines[-120:]
          summary = "\n".join(snippet).strip() or "Gradle build failed without a captured summary."
          print(summary)
          escaped = summary.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Gradle assembleDebug failed::{escaped}")
          PY

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_ARTIFACT_NAME }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  upload-debug-apk:
    runs-on: ubuntu-latest
    needs: build-debug
    if: ${{ needs.build-debug.result == 'success' && github.event_name != 'pull_request' }}
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_UPLOAD_PATH: ${{ secrets.SERVER_UPLOAD_PATH }}
    steps:
      - name: Validate SSH upload configuration
        id: upload_config
        run: |
          set -euo pipefail
          missing=0
          for var in SERVER_HOST SERVER_USER SERVER_SSH_KEY SERVER_UPLOAD_PATH; do
            if [ -z "${!var:-}" ]; then
              echo "::warning::$var is not configured. Server upload will be skipped."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "server_port=${SERVER_PORT:-22}" >> "$GITHUB_OUTPUT"

      - name: Skip server upload
        if: ${{ steps.upload_config.outputs.enabled != 'true' }}
        run: echo "Server upload skipped. The debug APK is still available as a GitHub artifact."

      - name: Download debug APK artifact
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APK_ARTIFACT_NAME }}
          path: dist

      - name: Prepare upload payload
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p upload
          apk_path="$(find dist -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No APK found in downloaded artifact." >&2
            exit 1
          fi

          cp "$apk_path" "upload/codex-android-debug-${GITHUB_RUN_NUMBER}.apk"
          cp "$apk_path" "upload/codex-android-debug-latest.apk"

      - name: Configure SSH
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/server_upload_key
          chmod 600 ~/.ssh/server_upload_key
          ssh-keyscan -p "${{ steps.upload_config.outputs.server_port }}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Create remote upload directory
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/server_upload_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ steps.upload_config.outputs.server_port }}" \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p '$SERVER_UPLOAD_PATH'"

      - name: Upload APK to SSH server
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          scp \
            -i ~/.ssh/server_upload_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -P "${{ steps.upload_config.outputs.server_port }}" \
            upload/*.apk \
            "$SERVER_USER@$SERVER_HOST:$SERVER_UPLOAD_PATH/"
