name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses
      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew
      - name: Build debug APK
        env:
          GITHUB_DEVICE_CLIENT_ID: ${{ secrets.GITHUB_DEVICE_CLIENT_ID }}
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --console=plain 2>&1 | tee gradle-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log

      - name: Surface Gradle failure details
        if: failure()
        run: |
          echo "Gradle build failed. Tail of gradle-build.log:"
          tail -n 120 gradle-build.log || true
          while IFS= read -r line; do
            escaped="${line//'%'/'%25'}"
            escaped="${escaped//$'\n'/'%0A'}"
            escaped="${escaped//$'\r'/'%0D'}"
            echo "::error::$escaped"
          done < <(tail -n 40 gradle-build.log || true)

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: codex-android-debug
          path: app/build/outputs/apk/debug/*.apk

  upload-apk-to-server:
    runs-on: ubuntu-latest
    needs: build
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST != '' && secrets.SERVER_HOST || '91.233.168.233' }}
      SERVER_PORT: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
      SERVER_USER: ${{ secrets.SERVER_USER != '' && secrets.SERVER_USER || 'root' }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_UPLOAD_PATH: ${{ secrets.SERVER_UPLOAD_PATH != '' && secrets.SERVER_UPLOAD_PATH || '/root/codex-app/builds' }}
    steps:
      - name: Check upload configuration
        id: upload_config
        run: |
          set -euo pipefail
          if [ -n "${SERVER_SSH_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "server_port=${SERVER_PORT:-22}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "server_port=22" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip upload when server secrets are missing
        if: ${{ steps.upload_config.outputs.enabled != 'true' }}
        run: echo "SERVER_SSH_KEY is not configured. APK remains available as a GitHub artifact only."

      - name: Download built APK
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: codex-android-debug
          path: dist

      - name: Prepare upload files
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p upload
          APK_PATH="$(find dist -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in downloaded artifact" >&2
            exit 1
          fi
          cp "$APK_PATH" "upload/codex-android-debug-${GITHUB_RUN_NUMBER}.apk"
          cp "$APK_PATH" "upload/codex-android-debug-latest.apk"

      - name: Ensure remote upload directory exists
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          port: ${{ steps.upload_config.outputs.server_port }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          script: mkdir -p "${{ env.SERVER_UPLOAD_PATH }}"

      - name: Upload APK to server
        if: ${{ steps.upload_config.outputs.enabled == 'true' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          port: ${{ steps.upload_config.outputs.server_port }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          source: "upload/*.apk"
          target: ${{ env.SERVER_UPLOAD_PATH }}
          overwrite: true
